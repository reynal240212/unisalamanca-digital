<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contraseña | UniSalamanca Digital Identity</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- SDK de Supabase y Bcrypt -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
    <script src="../supabase-client.js"></script>
    <style>
        :root {
            --primary: #4c1d95; /* Morado UniSalamanca */
            --secondary: #06b6d4; /* Cian UniSalamanca */
            --bg: #ffffff;
            --text-dark: #1e1b4b;
            --text-light: #6b7280;
            --border: #e2e8f0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f5f3ff 0%, #ffffff 100%);
            font-family: 'Outfit', sans-serif;
            color: var(--text-dark);
        }

        .container {
            display: flex;
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(76, 29, 149, 0.1);
            overflow: hidden;
            margin: 20px;
        }

        .mascot-side {
            flex: 1;
            background: var(--primary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: white;
            position: relative;
            background-image: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.1) 0%, transparent 50%);
        }

        .mascot-side img {
            width: 100%;
            max-width: 250px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));
            margin-bottom: 20px;
        }

        .mascot-side h2 {
            font-size: 1.2rem;
            text-align: center;
            margin: 0;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .mascot-side p {
            font-size: 0.85rem;
            opacity: 0.8;
            text-align: center;
            margin-top: 10px;
            line-height: 1.4;
        }

        .form-side {
            flex: 1.2;
            padding: 60px 40px;
        }

        .logo-box {
            margin-bottom: 30px;
            text-align: left;
        }

        .logo-box img {
            width: 100%;
            max-width: 280px;
            height: auto;
            margin-bottom: 10px;
            mix-blend-mode: multiply;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0;
            color: var(--primary);
        }

        .header p {
            color: var(--text-light);
            margin-top: 8px;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-dark);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 16px;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.1);
        }

        .btn-update {
            width: 100%;
            background: var(--secondary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(6, 182, 212, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-update:hover {
            background: #0891b2;
            transform: translateY(-2px);
        }

        .error {
            color: #ef4444;
            font-size: 0.85rem;
            background: #fee2e2;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: none;
            text-align: center;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                max-width: 450px;
                border-radius: 24px;
            }
            .mascot-side { padding: 30px; }
            .mascot-side img { max-width: 120px; }
            .form-side { padding: 40px 30px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mascot-side">
            <img src="img/squirrel.png" alt="Mascota Ardilla">
            <h2>NUESTRA COMUNIDAD</h2>
            <p>Se está moviendo y merece ser visto</p>
        </div>
        
        <div class="form-side">
            <div class="logo-box">
                <img src="img/logo.png" alt="UniSalamanca Logo">
            </div>
            
            <div class="header">
                <h1>Seguridad</h1>
                <p>Por favor, actualiza tu contraseña predeterminada para continuar.</p>
            </div>

            <div id="pwdError" class="error"></div>
            
            <form id="changePasswordForm">
                <div class="form-group">
                    <label>Contraseña Actual</label>
                    <div class="input-wrapper">
                        <input type="password" id="currentPassword" placeholder="Contraseña temporal" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Nueva Contraseña</label>
                    <div class="input-wrapper">
                        <input type="password" id="newPassword" placeholder="Mínimo 8 caracteres" minlength="8" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Confirmar Nueva Contraseña</label>
                    <div class="input-wrapper">
                        <input type="password" id="repeatPassword" placeholder="Confirmar contraseña" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-update">ACTUALIZAR SEGURIDAD</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('student_user'));
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            const form = document.getElementById('changePasswordForm');
            const errorArea = document.getElementById('pwdError');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorArea.style.display = 'none';

                const current = document.getElementById('currentPassword').value;
                const nuevo = document.getElementById('newPassword').value;
                const repetir = document.getElementById('repeatPassword').value;

                if (nuevo !== repetir) {
                    showError("Las contraseñas nuevas no coinciden");
                    return;
                }

                try {
                    // 1. Verificar hash local si existe (Legacy Fallback)
                    if (user.password_hash) {
                        try {
                            const match = dcodeIO.bcrypt.compareSync(current, user.password_hash);
                            if (!match) {
                                showError("La contraseña actual es incorrecta");
                                return;
                            }
                        } catch (bErr) {
                            console.warn("Bcrypt mismatch, proceeding with native check...");
                        }
                    }

                    // 2. Actualización Nativa en Supabase Auth
                    const { error: authError } = await supabaseClient.auth.updateUser({ 
                        password: nuevo 
                    });

                    if (authError && authError.status !== 401) {
                        showError("Error Autenticación: " + authError.message);
                        return;
                    }

                    // 3. Sincronizar nuevo hash de respaldo en public.user
                    const salt = dcodeIO.bcrypt.genSaltSync(10);
                    const newHash = dcodeIO.bcrypt.hashSync(nuevo, salt);

                    const { error: dbError } = await supabaseClient
                        .from('user')
                        .update({ 
                            password_hash: newHash,
                            must_change_password: false 
                        })
                        .eq('id', user.id);

                    if (!dbError) {
                        // Actualizar sesión local
                        user.must_change_password = false;
                        user.password_hash = newHash;
                        localStorage.setItem('student_user', JSON.stringify(user));

                        alert("¡Contraseña actualizada con éxito! Se han sincronizado tus credenciales nativas y de respaldo.");
                        window.location.href = 'index.html';
                    } else {
                        showError("Error de Base de Datos: " + dbError.message);
                    }
                } catch (err) {
                    console.error(err);
                    showError("Ocurrió un error inesperado. Inténtalo de nuevo.");
                }
            });

            function showError(msg) {
                errorArea.innerText = msg;
                errorArea.style.display = 'block';
            }
        });
    </script>
</body>
</html>
