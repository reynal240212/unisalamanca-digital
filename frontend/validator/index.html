<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Validador | UniSalamanca</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- SDK de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-client.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0f172a;
            color: white;
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            padding: 20px;
            background: rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .scanner-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        #reader {
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #6366f1;
        }
        .result-overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1e293b;
            padding: 30px;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        .result-overlay.active {
            transform: translateY(0);
        }
        .status-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }
        .student-photo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 15px;
            border: 3px solid #6366f1;
            display: none;
            object-fit: cover;
        }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .btn-close {
            margin-top: 20px;
            padding: 10px 30px;
            background: #6366f1;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <div style="font-weight: 700; font-size: 1.2rem;">UniSalamanca <span style="font-weight: 300; opacity: 0.7;">Validador</span></div>
        <button id="logoutBtn" style="background: none; border: 1px solid rgba(255,255,255,0.2); color: white; padding: 5px 15px; border-radius: 8px; cursor: pointer;">Salir</button>
    </header>

    <div class="scanner-container">
        <div id="reader"></div>
        <p style="margin-top: 20px; color: #94a3b8;">Apunta la cámara al código QR del estudiante</p>
    </div>

    <div id="resultOverlay" class="result-overlay">
        <div id="statusIcon" class="status-icon">✅</div>
        <img id="resultPhoto" src="" class="student-photo">
        <h2 id="resultTitle" style="margin: 0;">Acceso Permitido</h2>
        <p id="resultSubtitle" style="color: #94a3b8; margin: 10px 0 20px;"></p>
        <button class="btn-close" onclick="closeOverlay()">Siguiente Escaneo</button>
    </div>

    <script src="scanner.js"></script>
</body>
</html>
