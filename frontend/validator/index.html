<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Acceso | UniSalamanca Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- SDK de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-client.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #6366f1;
            --success: #10b981;
            --error: #ef4444;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 20px 25px;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 100;
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            font-weight: 300;
            color: var(--primary);
            margin-left: 5px;
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .scanner-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .scanner-frame {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1/1;
            background: var(--card-bg);
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        #reader {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
        }

        #reader div {
            border: none !important;
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, transparent, var(--primary), transparent);
            box-shadow: 0 0 15px var(--primary);
            animation: scan 3s ease-in-out infinite;
            z-index: 5;
        }

        @keyframes scan {
            0%, 100% { top: 5%; }
            50% { top: 95%; }
        }

        .scanner-instructions {
            margin-top: 30px;
            text-align: center;
        }

        .scanner-instructions h3 {
            margin: 0;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .scanner-instructions p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        /* Modal de Resultado Premium */
        .result-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .result-panel.active {
            opacity: 1;
            visibility: visible;
        }

        .result-card {
            background: #1e293b;
            width: 90%;
            max-width: 380px;
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            transform: scale(0.8) translateY(50px);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.6);
        }

        .result-panel.active .result-card {
            transform: scale(1) translateY(0);
        }

        .status-badge {
            width: 80px;
            height: 80px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            font-size: 40px;
            transition: all 0.3s;
        }

        .status-badge.denied {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
        }

        .status-badge.granted {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .student-avatar {
            width: 120px;
            height: 120px;
            border-radius: 40px;
            overflow: hidden;
            margin: 0 auto 20px;
            border: 4px solid var(--primary);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: none;
        }

        .student-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .result-info h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .result-info p {
            color: #94a3b8;
            margin: 8px 0 30px;
            line-height: 1.5;
        }

        .next-btn {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(99, 102, 241, 0.4);
        }

        @media (max-width: 480px) {
            .result-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-text">UniSalamanca<span>Validador</span></div>
        <button id="logoutBtn" class="logout-btn">Cerrar Sesión</button>
    </header>

    <div class="scanner-view">
        <div class="scanner-frame">
            <div id="reader"></div>
            <div class="scan-line"></div>
        </div>
        
        <div class="scanner-instructions">
            <h3>Preparado para Escanear</h3>
            <p>Apunta al código QR generado por el estudiante</p>
        </div>
    </div>

    <div id="resultPanel" class="result-panel">
        <div class="result-card">
            <div id="statusBadge" class="status-badge">✅</div>
            
            <div id="avatarContainer" class="student-avatar">
                <img id="studentPhoto" src="" alt="Foto Estudiante">
            </div>

            <div class="result-info">
                <h2 id="resultTitle">Acceso Permitido</h2>
                <p id="resultDetails"></p>
            </div>

            <button class="next-btn" onclick="closeOverlay()">LISTO PARA EL SIGUIENTE</button>
        </div>
    </div>

    <script src="scanner.js"></script>
</body>
</html>
